name: Daily Asil Slack Report

on:
  schedule:
    # GitHub Actions uses UTC. 21:00 UTC = 06:00 KST
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily Asil report
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python daily_asil_slack.py

      - name: Commit generated data and reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data reports
          git commit -m "Update daily Asil report" || echo "No changes to commit"
          git push
